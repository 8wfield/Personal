name: iTunes+Revenuecat系列解锁
description: 
  iTunes系列 自动查询 App 内购产品并注入最贵套餐凭证，可在设置中关闭。
  支持一键解锁 RevenueCat、Superwall 和 Adapty (Adapty 需卸载重装 App 才生效)。如果遇到解锁后报错或闪退的 App (比如 Filebar)，可以直接在插件设置里填名字跳过它！(默认填 '-' 代表全部 App 正常解锁)
icon: https://raw.githubusercontent.com/8wfield/Personal/main/Icons/Icons-all/AppStore(1).png
compat_arguments:
  Mock: https://reven.jsforbaby.workers.dev/reven
  Enabled: 'true'
  Expires: 2099-09-09
  Country: HK
compat_arguments_desc: |-
  Mock:
  Reven 网关地址，一般无需修改。
  Enabled:
  是否启用解锁。
  true = 拦截 verifyReceipt 并注入订阅凭证
  false = 不修改响应，直接放行
  Expires:
  订阅到期日期，格式 YYYY-MM-DD，默认 2099-09-09。
  Country:
  App Store 国家/地区代码 (两位大写字母, ISO 3166-1)，用于查询内购商品 ID。
  建议填该 App 在 App Store 的所属区域 (即你从哪个区下载的它): 国区 CN / 港区 HK / 美区 US。
  默认 HK 兼容性最好；但国区独占或国区限定促销 App 必须填 CN，否则注入的产品在该区未上架，可能导致解锁失败或 App 显示已订阅却仍走免费档。
compat_arguments:
  Bypass: '-'
  Strategy: auto
compat_arguments_schema:
  Bypass:
    name: 跳过指定App(绕过解锁)
    description: 遇到修改响应会报错的 App (如 Filebar) 可在此填入其 UA 关键词。多个用逗号隔开，填 - 表示全部解锁。
    default_value: '-'
  Strategy:
    name: 注入策略
    description: auto 官方规范; lifetime_sub 兼容老 App 把 lifetime 塞 subscriptions+2099; year/month 跳过 lifetime; all 注入所有 PID。lifetime 解锁失败时优先换 lifetime_sub。
    default_value: auto
    options:
    - auto
    - lifetime_sub
    - year
    - month
    - all
url_rewrites:
- match: ^https:\/\/buy\.itunes\.apple\.com\/verifyReceipt
  location: https://reven.jsforbaby.workers.dev/reven/buy.itunes.apple.com/verifyReceipt?enabled=true&expires=2099-09-09&country=US
scriptings:
- http_request:
    name: Reven转发
    match: ^https:\/\/(api\.revenuecat\.com|api\.rc-backup\.com|rc\.visionarytech\.ltd|revenue\.cuto\.app|proxy\.linearity\.io|subscriptions-api\.superwall\.com|api\.adapty\.io)\/
    script_url: https://reven.jsforbaby.workers.dev/reven/loon-redirect.js
    env:
      _compat.$argument: '{"Bypass":"-","Strategy":"auto"}'
    body_required: true
mitm:
  hostnames:
    includes:
    - buy.itunes.apple.com
    - api.revenuecat.com
    - api.rc-backup.com
    - rc.visionarytech.ltd
    - revenue.cuto.app
    - proxy.linearity.io
    - subscriptions-api.superwall.com
    - api.adapty.io