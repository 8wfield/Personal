name: 定时任务合集
description: 每天自动完成相关任务，根据需求进入插件打开相应开关即可。首次安装插件需打开对应 APP 或 小程序 获取Cookie。
author: FoKit[https://github.com/FoKit], Sliverkiss[https://github.com/Sliverkiss], ClydeTime[https://github.com/ClydeTime], wish[https://github.com/mist-whisper], ZenmoFeiShi[https://github.com/ZenmoFeiShi],chavyleung[https://github.com/chavyleung]

compat_arguments:
  哔哩哔哩Cron: "99 99 31 2 7"
  蜜雪冰城Cron: "99 99 31 2 7"
  小蚕霸王餐Cron: "99 99 31 2 7"
  晓晓优选Cron: "99 99 31 2 7"
  歪麦霸王餐Cron: "99 99 31 2 7"
  微信支付有优惠Cron: "99 99 31 2 7"
  EnableBiliScan: "false"
  EnableBiliApp: "false"
  EnableMixue: "false"
  EnableXiaocan: "false"
  EnableXxyx: "false"
  EnableWaimai: "false"
  EnableWechatPay: "false"

env_schema:
  哔哩哔哩Cron:
    name: 哔哩哔哩 Cron
    description: 定时任务Cron表达式（默认禁用，启用请填如 0 9 * * *）
    default_value: "99 99 31 2 7"

  蜜雪冰城Cron:
    name: 蜜雪冰城 Cron
    description: 定时任务Cron表达式（默认禁用，启用请填如 0 9 * * *）
    default_value: "99 99 31 2 7"

  小蚕霸王餐Cron:
    name: 小蚕霸王餐 Cron
    description: 定时任务Cron表达式（默认禁用，启用请填如 0 9 * * *）
    default_value: "99 99 31 2 7"

  晓晓优选Cron:
    name: 晓晓优选 Cron
    description: 定时任务Cron表达式（默认禁用，启用请填如 0 9 * * *）
    default_value: "99 99 31 2 7"

  歪麦霸王餐Cron:
    name: 歪麦霸王餐 Cron
    description: 定时任务Cron表达式（默认禁用，启用请填如 0 9 * * *）
    default_value: "99 99 31 2 7"

  微信支付有优惠Cron:
    name: 微信支付有优惠 Cron
    description: 定时任务Cron表达式（默认禁用，启用请填如 0 9 * * *）
    default_value: "99 99 31 2 7"

  EnableBiliScan:
    name: 哔哩哔哩[扫码] 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭，推荐与APP二选一）
    options:
      - "true"
      - "false"
    default_value: "false"

  EnableBiliApp:
    name: 哔哩哔哩[APP] 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭）
    options:
      - "true"
      - "false"
    default_value: "false"

  EnableMixue:
    name: 蜜雪冰城 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭）
    options:
      - "true"
      - "false"
    default_value: "false"

  EnableXiaocan:
    name: 小蚕霸王餐 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭）
    options:
      - "true"
      - "false"
    default_value: "false"

  EnableXxyx:
    name: 晓晓优选 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭）
    options:
      - "true"
      - "false"
    default_value: "false"

  EnableWaimai:
    name: 歪麦霸王餐 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭）
    options:
      - "true"
      - "false"
    default_value: "false"

  EnableWechatPay:
    name: 微信支付有优惠 获取Cookie
    description: 打开后运行获取Cookie脚本（获取完建议关闭）
    options:
      - "true"
      - "false"
    default_value: "false"

scriptings:
  - cron:
      name: 哔哩每日任务
      cron: "{{{哔哩哔哩Cron}}}"
      script_url: https://raw.githubusercontent.com/mist-whisper/Script/master/DailyBonus/BiliBili.js
      timeout: 15
      wake_system: true

  - http_response:
      name: 哔哩哔哩[扫码]
      match: ^https?:\/\/app\.bilibili\.com\/x\/resource\/fingerprint\?
      script_url: https://raw.githubusercontent.com/mist-whisper/Script/master/DailyBonus/BiliBili.js
      body_required: false
      timeout: 30
      when: "{{{EnableBiliScan}}} == \"true\""

  - http_request:
      name: 哔哩哔哩[APP]
      match: ^https?:\/\/app\.bilibili\.com\/x\/resource\/fingerprint\?
      script_url: https://raw.githubusercontent.com/mist-whisper/Script/master/DailyBonus/BiliBili.js
      body_required: false
      when: "{{{EnableBiliApp}}} == \"true\""

  - cron:
      name: 蜜雪冰城签到
      cron: "{{{蜜雪冰城Cron}}}"
      script_url: https://raw.githubusercontent.com/mist-whisper/Script/master/DailyBonus/Mixue.js
      timeout: 60

  - http_response:
      name: 蜜雪冰城
      match: ^https:\/\/mxsa\.mxbc\.net\/api\/v1\/customer\/info
      script_url: https://raw.githubusercontent.com/mist-whisper/Script/master/DailyBonus/Mixue.js
      body_required: true
      timeout: 60
      when: "{{{EnableMixue}}} == \"true\""

  - cron:
      name: 小蚕霸王餐签到
      cron: "{{{小蚕霸王餐Cron}}}"
      script_url: https://gist.githubusercontent.com/Sliverkiss/250a02315f0a2c99f42da3b3573375c8/raw
      timeout: 60

  - http_response:
      name: 小蚕霸王餐
      match: ^https:\/\/gw\.xiaocantech\.com\/rpc
      script_url: https://gist.githubusercontent.com/Sliverkiss/250a02315f0a2c99f42da3b3573375c8/raw
      body_required: true
      timeout: 60
      when: "{{{EnableXiaocan}}} == \"true\""

  - cron:
      name: 晓晓优选签到
      cron: "{{{晓晓优选Cron}}}"
      script_url: https://gist.githubusercontent.com/Sliverkiss/991a81be1fc8cf2a1937432be68f5521/raw/xxyx.js
      timeout: 60

  - http_response:
      name: 晓晓优选
      match: ^https:\/\/xxyx-client-api\.xiaoxiaoyouxuan\.com\/my
      script_url: https://gist.githubusercontent.com/Sliverkiss/991a81be1fc8cf2a1937432be68f5521/raw/xxyx.js
      body_required: true
      timeout: 60
      when: "{{{EnableXxyx}}} == \"true\""

  - cron:
      name: 歪麦每日任务
      cron: "{{{歪麦霸王餐Cron}}}"
      script_url: https://gist.githubusercontent.com/Sliverkiss/49a9ffb2169a2becc33bf4fdbf6eb99a/raw/wmbwc.js
      timeout: 15
      wake_system: true

  - http_request:
      name: 歪麦霸王餐
      match: ^https:\/\/wmapp-api\.waimaimingtang\.com\/api\/api\/v2\/user\/api_user_info_one
      script_url: https://gist.githubusercontent.com/Sliverkiss/49a9ffb2169a2becc33bf4fdbf6eb99a/raw/wmbwc.js
      body_required: true
      max_size: -1
      timeout: 60
      when: "{{{EnableWaimai}}} == \"true\""

  - cron:
      name: 支付有优惠金币获取
      cron: "{{{微信支付有优惠Cron}}}"
      script_url: https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/wechat_pay_coupon.js
      timeout: 60

  - http_response:
      name: 微信支付有优惠
      match: https:\/\/payapp\.weixin\.qq\.com\/(coupon-center-user\/home\/login|coupon-center-award\/award\/detail)
      script_url: https://raw.githubusercontent.com/FoKit/Scripts/main/scripts/wechat_pay_coupon.js
      body_required: true
      when: "{{{EnableWechatPay}}} == \"true\""

mitm:
  hostnames:
    - mxsa.mxbc.net
    - payapp.weixin.qq.com
    - maicai.api.ddxq.mobi
    - wmapp-api.waimaimingtang.com
    - gw.xiaocantech.com
    - xxyx-client-api.xiaoxiaoyouxuan.com