name: Kelee For Egern
description: |

  可莉插件中心：https://hub.kelee.one
homepage: https://hub.kelee.one
body_rewrites:
  - response_regex:
      match: https://(pluginhub|hub)\.kelee\.one/
      find: loon://import\?plugin=
      replace: egern:///modules/new?url=
mitm:
  hostnames:
    includes:
      - pluginhub.kelee.one
      - hub.kelee.one