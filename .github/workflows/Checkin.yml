name: Daily Check-in

on:
  schedule:
    - cron: '0 1 * * *'     # UTC 01:00 ≈ 北京時間 09:00
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Perform check-in
        uses: actions/github-script@v7
        env:
          DOMAIN:  ${{ secrets.DOMAIN  }}
          USER:    ${{ secrets.USER    }}
          PASS:    ${{ secrets.PASS    }}
          TGTOKEN: ${{ secrets.TGTOKEN }}
          TGID:    ${{ secrets.TGID    }}
        with:
          script: |
            const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36';

            const domainRaw = process.env.DOMAIN || '';
            const user     = process.env.USER   || '';
            const pass     = process.env.PASS   || '';
            const BotToken = process.env.TGTOKEN || '';
            const ChatID   = process.env.TGID    || '';

            if (!domainRaw || !user || !pass) {
              core.setFailed('缺少必要參數：DOMAIN / USER / PASS');
              return;
            }

            const domain = domainRaw.includes('//') ? domainRaw : `https://${domainRaw}`;

            const sleep = ms => new Promise(r => setTimeout(r, ms));

            function getSetCookies(headers) {
              const list = [];
              if (typeof headers.getSetCookie === 'function') {
                for (const c of headers.getSetCookie()) {
                  const pair = c.split(';')[0].trim();
                  if (pair.includes('=')) list.push(pair);
                }
              } else {
                const raw = headers.get('set-cookie');
                if (raw) {
                  raw.split(/,\s*(?=[a-zA-Z0-9_-]+\s*=)/).forEach(c => {
                    const pair = c.split(';')[0].trim();
                    if (pair.includes('=')) list.push(pair);
                  });
                }
              }
              return list;
            }

            function mergeCookies(a, b) {
              const m = new Map();
              [...a, ...b].forEach(p => {
                const i = p.indexOf('=');
                if (i > 0) m.set(p.slice(0, i), p);
              });
              return [...m.values()];
            }

            async function sendTG(text) {
              if (!BotToken || !ChatID) return;
              const url = `https://api.telegram.org/bot${BotToken}/sendMessage`;
              try {
                const r = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    chat_id: ChatID,
                    text,
                    parse_mode: 'HTML'
                  })
                });
                if (!r.ok) {
                  core.warning(`TG 推送失敗: ${await r.text()}`);
                }
              } catch (e) {
                core.warning(`TG 異常: ${e.message}`);
              }
            }

            async function tryCheckin() {
              const maxRetry = 3;
              let cookies = [];

              for (let attempt = 1; attempt <= maxRetry; attempt++) {
                try {
                  core.info(`[嘗試 ${attempt}/${maxRetry}] 開始`);

                  const login = await fetch(`${domain}/auth/login`, {
                    method: 'POST',
                    headers: {
                      'Content-Type': 'application/json',
                      'User-Agent': UA,
                      'Accept': 'application/json, text/plain, */*',
                      'Origin': domain,
                      'Referer': `${domain}/auth/login`
                    },
                    body: JSON.stringify({
                      email: user,
                      passwd: pass,
                      remember_me: 'on',
                      code: ''
                    })
                  });

                  if (!login.ok) {
                    throw new Error(`登入請求失敗 HTTP ${login.status}`);
                  }

                  const j = await login.json();
                  if (j.ret !== 1) {
                    throw new Error(`登入失敗：${j.msg || '未知錯誤'}`);
                  }

                  core.info('✓ 登入成功');

                  cookies = getSetCookies(login.headers);
                  if (cookies.length === 0) {
                    throw new Error('未獲取到任何 Cookie');
                  }

                  // 簡單驗證 session
                  let sessionOk = false;
                  for (let i = 0; i < 5; i++) {
                    const res = await fetch(`${domain}/user`, {
                      headers: {
                        'User-Agent': UA,
                        'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                        'Referer': `${domain}/`,
                        'Cookie': cookies.join('; ')
                      }
                    });
                    cookies = mergeCookies(cookies, getSetCookies(res.headers));
                    if (res.ok) {
                      sessionOk = true;
                      break;
                    }
                    await sleep(1000);
                  }
                  if (!sessionOk) {
                    core.warning('⚠ session 驗證未完全成功，仍嘗試簽到');
                  }

                  const check = await fetch(`${domain}/user/checkin`, {
                    method: 'POST',
                    headers: {
                      'User-Agent': UA,
                      'Accept': 'application/json, text/plain, */*',
                      'Origin': domain,
                      'Referer': `${domain}/user`,
                      'X-Requested-With': 'XMLHttpRequest',
                      'Cookie': cookies.join('; ')
                    }
                  });

                  if (!check.ok) {
                    throw new Error(`簽到請求失敗 HTTP ${check.status}`);
                  }

                  const result = await check.json().catch(() => ({}));
                  const msg = result.msg || result.message || JSON.stringify(result);

                  core.info(`簽到結果：${msg}`);
                  await sendTG(msg);

                  return { success: true, message: msg };
                } catch (e) {
                  core.error(`第 ${attempt} 次失敗: ${e.message}`);
                  if (attempt < maxRetry) {
                    core.info(`等待 5 秒後重試...`);
                    await sleep(5000);
                  } else {
                    const failMsg = `簽到最終失敗：${e.message}`;
                    await sendTG(failMsg);
                    core.setFailed(failMsg);
                    return { success: false, message: failMsg };
                  }
                }
              }
            }

            await tryCheckin();