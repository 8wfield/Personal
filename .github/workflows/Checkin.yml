name: Daily Check-in

on:
  schedule:
    # 每天 UTC 01:00 → 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run checkin script
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
          USER: ${{ secrets.USER }}
          PASS: ${{ secrets.PASS }}
          TGTOKEN: ${{ secrets.TGTOKEN }}
          TGID: ${{ secrets.TGID }}
        run: |
          #!/usr/bin/env node
          const core = require('@actions/core');
          const fetch = require('node-fetch').default;

          const UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36';

          const domainRaw = process.env.DOMAIN || '';
          const user     = process.env.USER   || '';
          const pass     = process.env.PASS   || '';
          const BotToken = process.env.TGTOKEN || '';
          const ChatID   = process.env.TGID    || '';

          if (!domainRaw || !user || !pass) {
            core.setFailed('缺少必要参数：DOMAIN / USER / PASS');
            process.exit(1);
          }

          const domain = domainRaw.includes('//') ? domainRaw : `https://${domainRaw}`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          function getSetCookies(headers) {
            const list = [];
            if (typeof headers.getSetCookie === 'function') {
              for (const cookie of headers.getSetCookie()) {
                const pair = cookie.split(';')[0].trim();
                if (pair && pair.includes('=')) list.push(pair);
              }
            } else {
              const raw = headers.get('set-cookie');
              if (raw) {
                raw.split(/,\s*(?=[a-zA-Z0-9_-]+\s*=)/).forEach(c => {
                  const pair = c.split(';')[0].trim();
                  if (pair && pair.includes('=')) list.push(pair);
                });
              }
            }
            return list;
          }

          function mergeCookies(existing, incoming) {
            const map = new Map();
            for (const pair of existing) {
              const i = pair.indexOf('=');
              if (i > 0) map.set(pair.slice(0, i), pair);
            }
            for (const pair of incoming) {
              const i = pair.indexOf('=');
              if (i > 0) map.set(pair.slice(0, i), pair);
            }
            return Array.from(map.values());
          }

          async function sendTelegram(text) {
            if (!BotToken || !ChatID) return;
            const url = `https://api.telegram.org/bot${BotToken}/sendMessage`;
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: ChatID, text, parse_mode: 'HTML' }),
              });
              if (!res.ok) {
                console.warn(`Telegram 发送失败: ${await res.text()}`);
              }
            } catch (err) {
              console.warn(`Telegram 异常: ${err.message}`);
            }
          }

          async function performCheckin() {
            const maxRetries = 3;
            const retryDelay = 5000;
            const logs = [];
            const log = msg => { logs.push(msg); console.log(msg); };

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
              try {
                log(`[第 ${attempt}/${maxRetries} 次尝试] 开始`);

                const loginRes = await fetch(`${domain}/auth/login`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'User-Agent': UA,
                    'Accept': 'application/json, text/plain, */*',
                    'Origin': domain,
                    'Referer': `${domain}/auth/login`,
                  },
                  body: JSON.stringify({
                    email: user,
                    passwd: pass,
                    remember_me: 'on',
                    code: '',
                  }),
                });

                if (!loginRes.ok) {
                  throw new Error(`登录失败 HTTP ${loginRes.status}`);
                }

                const loginJson = await loginRes.json();
                if (loginJson.ret !== 1) {
                  throw new Error(`登录失败：${loginJson.msg || '未知错误'}`);
                }
                log('✓ 登录成功');

                let cookies = getSetCookies(loginRes.headers);
                if (cookies.length === 0) throw new Error('未获取到任何 Cookie');

                // 尝试验证会话
                let sessionOk = false;
                for (let i = 1; i <= 5; i++) {
                  const chk = await fetch(`${domain}/user`, {
                    headers: {
                      'User-Agent': UA,
                      'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                      'Referer': `${domain}/`,
                      'Cookie': cookies.join('; '),
                    },
                  });
                  cookies = mergeCookies(cookies, getSetCookies(chk.headers));
                  if (chk.ok) {
                    sessionOk = true;
                    break;
                  }
                  await sleep(1000);
                }
                if (!sessionOk) log('⚠ 会话验证未完全成功，仍尝试签到');

                const checkRes = await fetch(`${domain}/user/checkin`, {
                  method: 'POST',
                  headers: {
                    'User-Agent': UA,
                    'Accept': 'application/json, text/plain, */*',
                    'Origin': domain,
                    'Referer': `${domain}/user`,
                    'X-Requested-With': 'XMLHttpRequest',
                    'Cookie': cookies.join('; '),
                  },
                });

                if (!checkRes.ok) {
                  throw new Error(`签到请求失败 HTTP ${checkRes.status}`);
                }

                const checkJson = await checkRes.json().catch(() => ({}));
                const msg = checkJson.msg || checkJson.message || JSON.stringify(checkJson);
                log(`签到结果: ${msg}`);

                return { success: true, result: msg, logs };
              } catch (err) {
                log(`❌ 第 ${attempt} 次失败: ${err.message}`);
                if (attempt < maxRetries) {
                  log(`等待 ${retryDelay/1000}s 后重试...`);
                  await sleep(retryDelay);
                } else {
                  return { success: false, result: `签到失败: ${err.message}`, logs };
                }
              }
            }
          }

          (async () => {
            const res = await performCheckin();
            await sendTelegram(res.result);
            console.log('最终结果：', res.result);

            if (!res.success) {
              core.setFailed(res.result);
            }
          })();