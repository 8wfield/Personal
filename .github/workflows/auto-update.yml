name: Build Egern Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Prepare Directories
        run: |
          mkdir -p Egern/Rule
          mkdir -p tmp
      - name: Download and Convert Rules
        run: |
          RULE=(
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Telegram.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Alibaba.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/ByteDance.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Tencent.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/YouTube.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Twitter.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/TikTok.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Github.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Google.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Spotify.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Netflix.list"
          )

          RULES=(
            "BanAD https://anti-ad.net/surge.txt https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge-RULE-SET.list"
            "ChinaDirect https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/direct.txt https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list"
            "GFWList https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset/gfw.txt https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list"
            "Apple https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Apple.list https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/AppleNews.list"
            "Meta https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Facebook.list https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Instagram.list https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Threads/Threads.list"
            "HttpDns https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/BlockHttpDNS/BlockHttpDNS.list"
            "AI https://gist.githubusercontent.com/ddgksf2013/cb4121e8b5c5d865cc949cb8120320c4/raw/Ai.yaml"
          )

          CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y/%m/%d')

          for item in "${RULE[@]}"; do
            url=$(echo "$item" | xargs)
            filename=$(basename "$url" .list)
            curl -sL -f "$url" -o "tmp/$filename.list" || echo "失败: $url"
          done

          for group in "${RULES[@]}"; do
            group_name=$(echo "$group" | cut -d' ' -f1)
            temp_merged="tmp/$group_name.merged"
            > "$temp_merged"
            links=$(echo "$group" | cut -d' ' -f2-)
            for url in $links; do
              curl -sL -f "$url" >> "$temp_merged" && echo "" >> "$temp_merged" || echo "失败: $url"
            done
            sort -u "$temp_merged" | grep -v '^$' > "tmp/$group_name.list"
          done

          ORDERED_RULE_TYPES=(
            "DOMAIN"
            "DOMAIN-KEYWORD"
            "DOMAIN-SUFFIX"
            "DOMAIN-WILDCARD"
            "GEOIP"
            "IP-CIDR"
            "IP-CIDR6"
            "URL-REGEX"
            "USER-AGENT"
            "IP-ASN"
            "DEST-PORT"
          )

          declare -A RULE_MAP=(
            ["DOMAIN"]="domain_set"
            ["DOMAIN-KEYWORD"]="domain_keyword_set"
            ["DOMAIN-SUFFIX"]="domain_suffix_set"
            ["DOMAIN-WILDCARD"]="domain_wildcard_set"
            ["GEOIP"]="geoip_set"
            ["IP-CIDR"]="ip_cidr_set"
            ["IP-CIDR6"]="ip_cidr6_set"
            ["URL-REGEX"]="url_regex_set"
            ["USER-AGENT"]="user_agent_set"
            ["IP-ASN"]="asn_set"
            ["DEST-PORT"]="dest_port_set"
          )

          for list_file in tmp/*.list; do
            [ -e "$list_file" ] || break
            base_name=$(basename "$list_file" .list)
            output_file="Egern/Rule/$base_name.yaml"

            grep -E '^[- ]*(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-WILDCARD|IP-CIDR|IP-CIDR6|IP-ASN|URL-REGEX|DEST-PORT|GEOIP|USER-AGENT),' "$list_file" | sed 's/,no-resolve$//' > tmp/current_work.tmp

            no_resolve_flag="false"
            if grep -qE '^[- ]*(IP-(ASN|CIDR|CIDR6)),.*,no-resolve$' "$list_file"; then
              no_resolve_flag="true"
            fi

            FILE_CONTENT=""
            FILE_CONTENT+="# 规则名称: $base_name"$'\n'
            FILE_CONTENT+="# 规则统计: 0"$'\n'
            FILE_CONTENT+="# 更新时间: PLACEHOLDER"$'\n'
            FILE_CONTENT+=""$'\n'

            if [ "$no_resolve_flag" = "true" ]; then
              FILE_CONTENT+="no_resolve: true"$'\n'
              FILE_CONTENT+=""$'\n'
            fi

            for rule_type in "${ORDERED_RULE_TYPES[@]}"; do
              egern_type="${RULE_MAP[$rule_type]}"
              grep "^[- ]*$rule_type," tmp/current_work.tmp | \
              awk -F',' -v rule_type="$rule_type" '{
                value=$2;
                if (rule_type == "URL-REGEX" || rule_type == "DOMAIN-WILDCARD") {
                  value="\"" value "\""
                }
                if (rule_type == "USER-AGENT" && value ~ /^\*.*\*$/) {
                  value="\047" value "\047"
                }
                print value
              }' | sort -u > tmp/values.tmp

              if [ -s tmp/values.tmp ]; then
                FILE_CONTENT+="$egern_type:"$'\n'
                FILE_CONTENT+="$(sed 's/^/  - /' tmp/values.tmp)"$'\n'
                FILE_CONTENT+=""$'\n'
              fi
            done

            total_rules=$(echo "$FILE_CONTENT" | grep -c '^  - ')
            FILE_CONTENT=$(echo "$FILE_CONTENT" | sed "2s|# 规则统计: 0|# 规则统计: $total_rules|")

            FINAL_DATE="$CURRENT_TIME"
            if git ls-tree --name-only HEAD "Egern/Rule/$base_name.yaml" &>/dev/null; then
              OLD_CONTENT=$(git show HEAD:"Egern/Rule/$base_name.yaml" 2>/dev/null)
              if [ -n "$OLD_CONTENT" ]; then
                OLD_DATE_LINE=$(echo "$OLD_CONTENT" | grep -m 1 "^# 更新时间:")
                OLD_DATE=$(echo "$OLD_DATE_LINE" | sed 's|# 更新时间: ||')
                OLD_RULES=$(echo "$OLD_CONTENT" | tail -n +4 | grep -v '^no_resolve: true$' | grep -v '^$')
                NEW_RULES=$(echo "$FILE_CONTENT" | tail -n +4 | grep -v '^no_resolve: true$' | grep -v '^$')
                if [ "$OLD_RULES" = "$NEW_RULES" ]; then
                  FINAL_DATE="$OLD_DATE"
                fi
              fi
            fi

            FILE_CONTENT=$(echo "$FILE_CONTENT" | sed "3s|# 更新时间: PLACEHOLDER|# 更新时间: $FINAL_DATE|")
            echo "$FILE_CONTENT" > "$output_file"
          done

      - name: Commit Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          NEW_OR_CHANGED_FILES=0
          for yaml_file in Egern/Rule/*.yaml; do
            [ -e "$yaml_file" ] || continue
            if ! git diff --quiet -- "$yaml_file" 2>/dev/null; then
              git add "$yaml_file"
              NEW_OR_CHANGED_FILES=1
              echo "添加/更新文件: $yaml_file"
            fi
          done

          if [ $NEW_OR_CHANGED_FILES -eq 1 ]; then
            echo "检测到规则内容变化，正在更新..."
            git commit --amend --no-edit --allow-empty 2>/dev/null || git commit -m "Egern Rules - Auto Updated"
            git push --force
          else
            echo "规则内容无变化，跳过提交。"
          fi